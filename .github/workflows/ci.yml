name: CI

on:
  push:
    branches: [main]
    paths:
      - "seedling/**"
  pull_request:
    branches: [main]
    paths:
      - "seedling/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./seedling

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: "./seedling/pnpm-lock.yaml"

      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm run lint
      - run: pnpm run test:coverage

      # (Optional) If you want to keep coverage reports as artifacts:
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: seedling/coverage/
