name: CI

on:
  push:
    branches: [main]
    paths:
      - "seedling/**"
  pull_request:
    branches: [main]
    paths:
      - "seedling/**"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Force Node 24 for actions
    defaults:
      run:
        working-directory: ./seedling

    steps:
      - uses: actions/checkout@v6

      # Install pnpm first (so it's available for caching and later steps)
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: "./seedling/pnpm-lock.yaml"

      - run: pnpm install
      - run: pnpm run lint
      - run: pnpm run test:coverage

      # (Optional) Upload coverage reports as artifacts
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: seedling/coverage/
