name: Release and Publish

on:
  push:
    tags:
      - "v*"

jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      id-token: write
      pull-requests: read
    defaults:
      run:
        working-directory: ./seedling

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Need full history for changelog generation

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: "./seedling/pnpm-lock.yaml"

      - run: pnpm install
      - run: pnpm run prepublishOnly

      # Get the tag being built
      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # Get the previous tag for comparison
      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "${{ steps.tag.outputs.tag }}" | head -n 1)
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          configuration: ".github/changelog-config.json"
          commitMode: "true" # Explicitly enable commit mode
          fromTag: ${{ steps.prev_tag.outputs.prev_tag }}
          toTag: ${{ steps.tag.outputs.tag }}
          failOnError: false # Don't fail if changelog is empty
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Debug the output
      - name: Debug Changelog
        run: |
          echo "Changelog output:"
          echo "${{ steps.changelog.outputs.changelog }}"
          echo "Length: $(echo "${{ steps.changelog.outputs.changelog }}" | wc -c) characters"

      # Write changelog to file
      - name: Write Changelog to File
        run: |
          if [ -z "${{ steps.changelog.outputs.changelog }}" ]; then
            echo "# ${{ steps.tag.outputs.tag }}" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"* %s (%h)" $(git describe --tags --abbrev=0 ${{ steps.prev_tag.outputs.prev_tag }} 2>/dev/null || echo "")..HEAD >> CHANGELOG.md || true
          else
            echo "${{ steps.changelog.outputs.changelog }}" > CHANGELOG.md
          fi
          echo "CHANGELOG.md contents:"
          cat CHANGELOG.md

      # Create GitHub Release with body from file
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: seedling ${{ steps.tag.outputs.tag }}
          body_path: seedling/CHANGELOG.md
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks
