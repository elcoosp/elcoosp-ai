name: Release and Publish

on:
  push:
    tags:
      - "v*" # Triggers on any tag starting with 'v' (e.g., v0.1.0, v1.2.3)

jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create GitHub releases
    defaults:
      run:
        working-directory: ./seedling

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetches all history for accurate changelog generation

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
          cache-dependency-path: ./seedling/pnpm-lock.yaml

      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm run prepublishOnly # Builds, checks, and tests

      # 1. Create GitHub Release (auto-generates notes from commits)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # If you want to attach build artifacts, uncomment:
          # files: |
          #   seedling/dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Publish to npm
      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
