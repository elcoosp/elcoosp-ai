name: Release and Publish

on:
  push:
    tags:
      - "v*"

jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      id-token: write
      pull-requests: read
    defaults:
      run:
        working-directory: ./seedling

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # required for git-cliff to see all commits

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: "./seedling/pnpm-lock.yaml"

      - run: pnpm install
      - run: pnpm run prepublishOnly

      # Generate changelog with git-cliff
      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          # Optional: path to a custom config file (defaults to cliff.toml in repo root)
          # config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      # Read the generated changelog into an output variable
      - name: Read Changelog
        id: read_changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            content=$(cat CHANGELOG.md)
            # Use a heredoc to safely pass multiline content
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "$content" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "notes=No notable changes" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: seedling ${{ github.ref_name }}
          body: ${{ steps.read_changelog.outputs.notes }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks
